<script>
"use strict";

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('vc');
const SIZE   = Math.min(Math.round(window.innerWidth * 0.74), 246);
canvas.width = SIZE; canvas.height = SIZE;
canvas.style.width = SIZE+'px'; canvas.style.height = SIZE+'px';
const ctx = canvas.getContext('2d');
const CX = SIZE/2, CY = SIZE/2, R = SIZE * 0.455;

// ── Audio state ───────────────────────────────────────────────────────────────
let audioCtx=null, analyser=null, sourceNode=null;
let loFilter, hiFilter, delayNode, delayGain, dryGain, masterGain;
let scriptProc=null, lameMp3Enc=null, mp3Chunks=[];
let isProcessing=true, isRecording=false, audioReady=false;
let fileObjectURL=null;

const audioEl   = document.getElementById('audio-el');
const bypassBtn = document.getElementById('btn-bypass');
const statusEl  = document.getElementById('status-text');
const seekBar   = document.getElementById('seek-bar');
const timeLbl   = document.getElementById('time-display');

// ── Geodesic sphere ───────────────────────────────────────────────────────────
// 3 bands driven by separate freq zones:
//   lo  → contour (bass)  bins 0–4
//   mid → depth (spatial) bins 5–18
//   hi  → clarity(treble) bins 19–55
const LAT_DIVS=10, LON_DIVS=20;
const NODES=[], EDGES=[];

for (let li=0; li<=LAT_DIVS; li++) {
    const frac = li/LAT_DIVS;
    const lat  = -Math.PI/2 + Math.PI*frac;
    const type = frac<0.33?'lo': frac>0.66?'hi':'mid';
    const fi   = type==='lo'  ? Math.floor(Math.random()*5)
               : type==='hi'  ? 19+Math.floor(Math.random()*37)
               :                 5+Math.floor(Math.random()*14);
    const cnt  = Math.max(1, Math.round(LON_DIVS*Math.cos(lat)));
    for (let lj=0; lj<cnt; lj++) {
        const lon = 2*Math.PI*lj/cnt + (li%2?0.18:0);
        NODES.push({lat, lon, type, fi});
    }
}

// Edges: connect angularly nearby nodes for geodesic mesh
for (let a=0; a<NODES.length; a++) {
    for (let b=a+1; b<NODES.length; b++) {
        const na=NODES[a], nb=NODES[b];
        const dlat=na.lat-nb.lat;
        let dlon=Math.abs(na.lon-nb.lon); if(dlon>Math.PI) dlon=2*Math.PI-dlon;
        const midLat=(na.lat+nb.lat)/2;
        const d=Math.sqrt(dlat*dlat + (dlon*Math.cos(midLat))**2);
        if (d<0.40) EDGES.push([a,b]);
    }
}

// ── Celestial orbital star system ────────────────────────────────────────────
// Each star belongs to a frequency band matching the 3 slider zones:
//   band='lo'  → LO CONTOUR (bass)    — equatorial orbits, teal-green
//   band='mid' → DEPTH (spatial/mid)  — inclined orbits,   cyan
//   band='hi'  → CLARITY (treble)     — polar orbits,      cold blue-white
//
// Full Keplerian mechanics:
//   • Elliptical orbits (eccentricity 0–0.42)
//   • Orbital precession: ascending node drifts slowly over time
//   • Axial wobble: inclination oscillates gently (like a spinning top)
//   • Kepler's 3rd law: outer stars orbit slower
//   • ~30% retrograde
//   • Trail rendering: ghost positions drawn behind each star
const STAR_BANDS = [
    ...Array(18).fill('lo'),
    ...Array(16).fill('mid'),
    ...Array(18).fill('hi')
];

const STARS = STAR_BANDS.map((band) => {
    const orbitR  = 0.13 + Math.random() * 0.68;
    const dir     = Math.random() < 0.3 ? -1 : 1;
    // Kepler 3rd law: T ∝ a^1.5, so ω ∝ a^-1.5 → speed ∝ 1/sqrt(a)
    const speed   = dir * (0.055 + Math.random() * 0.20) / Math.sqrt(orbitR);
    // Band-specific inclination ranges
    const inclBase  = band==='lo'  ? (Math.random()-0.5)*0.55          // near equator
                    : band==='hi'  ? Math.PI*0.5 + (Math.random()-0.5)*0.7  // near poles
                    :                (Math.random()-0.5)*Math.PI;      // full range
    const ascNode0  = Math.random() * Math.PI * 2;
    // Precession rate: slow drift of orbital plane
    const precRate  = (Math.random()-0.5) * 0.012;
    // Axial wobble: inclination oscillates sinusoidally
    const wobbleAmp = 0.02 + Math.random() * 0.08;
    const wobbleSpd = 0.008 + Math.random() * 0.025;
    const wobblePhs = Math.random() * Math.PI * 2;
    const ecc       = Math.random() * 0.42;
    const fi        = band==='lo'  ? Math.floor(Math.random()*5)
                    : band==='hi'  ? 19+Math.floor(Math.random()*35)
                    :                 5+Math.floor(Math.random()*14);
    return {
        band, fi,
        hue: band,          // color = band identity
        orbitR, speed, inclBase, ascNode0, precRate,
        wobbleAmp, wobbleSpd, wobblePhs,
        ecc,
        phase       : Math.random() * Math.PI * 2,
        size        : 0.10 + Math.random() * 0.48 * (1 - orbitR * 0.3),
        basOp       : 0.20 + Math.random() * 0.50,
        twinkleSpeed: 0.5  + Math.random() * 2.5,
        twinkleAmp  : 0.08 + Math.random() * 0.28,
        twinklePhase: Math.random() * Math.PI * 2,
        trailLen    : 3 + Math.floor(Math.random() * 5),   // ghost steps
        trailDt     : 0.18 + Math.random() * 0.25,         // time gap per ghost
    };
});

function getStarPos(s, t, timeOffset) {
    const tEval = t - (timeOffset || 0);
    // Live precessing orbital elements
    const ascNode = s.ascNode0 + s.precRate * tEval;
    const incl    = s.inclBase + s.wobbleAmp * Math.sin(s.wobbleSpd * tEval + s.wobblePhs);
    // Keplerian position
    const M = s.phase + s.speed * tEval;
    const E = M + s.ecc * Math.sin(M);   // eccentric anomaly (1st order)
    const trueA = 2 * Math.atan2(
        Math.sqrt(1 + s.ecc) * Math.sin(E / 2),
        Math.sqrt(1 - s.ecc) * Math.cos(E / 2)
    );
    const rRaw = s.orbitR * R * (1 - s.ecc * s.ecc) / (1 + s.ecc * Math.cos(trueA));
    const r    = Math.min(rRaw, R * 0.87);
    const xOrb = r * Math.cos(trueA);
    const yOrb = r * Math.sin(trueA);
    // Rotate orbital plane by inclination + ascending node
    const cosI = Math.cos(incl), sinI = Math.sin(incl);
    const cosN = Math.cos(ascNode), sinN = Math.sin(ascNode);
    const x3 =  cosN * xOrb - sinN * yOrb * cosI;
    const y3 =  sinN * xOrb + cosN * yOrb * cosI;
    const z3 =                       yOrb * sinI;
    return { sx: CX + x3, sy: CY - y3, depth: z3 / R };
}

// ── 3D projection ─────────────────────────────────────────────────────────────
function proj(lat, lon, rotY) {
    const cl=Math.cos(lat), sl=Math.sin(lat);
    const co=Math.cos(lon+rotY), so=Math.sin(lon+rotY);
    return { x: CX+cl*so*R, y: CY-sl*R, z: cl*co };
}

// ── Audio graph ───────────────────────────────────────────────────────────────
function buildAudioGraph() {
    if (audioReady) return true;
    try {
        audioCtx   = new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
        analyser   = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        analyser.smoothingTimeConstant = 0.78;
        sourceNode = audioCtx.createMediaElementSource(audioEl);

        loFilter   = audioCtx.createBiquadFilter();
        loFilter.type='lowshelf'; loFilter.frequency.value=150; loFilter.gain.value=0;
        hiFilter   = audioCtx.createBiquadFilter();
        hiFilter.type='highshelf'; hiFilter.frequency.value=3000; hiFilter.gain.value=0;
        delayNode  = audioCtx.createDelay(1.0); delayNode.delayTime.value=0.06;
        delayGain  = audioCtx.createGain(); delayGain.gain.value=0;
        dryGain    = audioCtx.createGain(); dryGain.gain.value=1;
        masterGain = audioCtx.createGain(); masterGain.gain.value=1;

        sourceNode.connect(loFilter);
        loFilter.connect(hiFilter);
        hiFilter.connect(dryGain);   dryGain.connect(masterGain);
        hiFilter.connect(delayNode); delayNode.connect(delayGain); delayGain.connect(masterGain);
        masterGain.connect(analyser);
        analyser.connect(audioCtx.destination);

        // ScriptProcessor for PCM capture → lamejs MP3
        // Route through a SILENT gain (gain=0) so ScriptProcessor can read PCM
        // without adding a second copy of the audio to the output (which caused saturation).
        try {
            scriptProc = audioCtx.createScriptProcessor(4096, 2, 2);
            const silentSink = audioCtx.createGain();
            silentSink.gain.value = 0;
            masterGain.connect(scriptProc);
            scriptProc.connect(silentSink);
            silentSink.connect(audioCtx.destination); // Web Audio requires a destination connection
            scriptProc.onaudioprocess = function(e) {
                if (!isRecording || !lameMp3Enc) return;
                const L = floatTo16(e.inputBuffer.getChannelData(0));
                const Ri= floatTo16(e.inputBuffer.getChannelData(1));
                const buf = lameMp3Enc.encodeBuffer(L, Ri);
                if (buf.length>0) mp3Chunks.push(new Int8Array(buf));
            };
        } catch(e){ console.warn('ScriptProcessor N/A',e); }

        audioReady=true; return true;
    } catch(e){ console.error('AudioCtx failed',e); setStatus('AUDIO ENGINE ERROR'); return false; }
}

function floatTo16(buf){
    // -0.1 dBFS ceiling: linear peak limit of 0.9886 prevents MP3 encoder clipping.
    // MP3 encoding can introduce inter-sample peaks above 0 dBFS even when the
    // PCM is at 0 dBFS, so we pull the ceiling down by 0.1 dB as headroom.
    const CEILING = 0.9886;   // 10^(-0.1/20) = 0.9886
    const out = new Int16Array(buf.length);
    for (let i = 0; i < buf.length; i++) {
        const s = Math.max(-CEILING, Math.min(CEILING, buf[i]));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return out;
}

function resumeCtx(){ if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); }

// ── File ──────────────────────────────────────────────────────────────────────
document.getElementById('audio-upload').addEventListener('change', function(e){
    const f=e.target.files[0]; if(!f) return;
    if(fileObjectURL) URL.revokeObjectURL(fileObjectURL);
    fileObjectURL=URL.createObjectURL(f);
    audioEl.src=fileObjectURL; audioEl.load();
    const nm=f.name.length>24?f.name.slice(0,21)+'…':f.name;
    setStatus('LOADED: '+nm.toUpperCase());
    seekBar.value=0; timeLbl.textContent='0:00'; this.value='';
});

// ── Transport ─────────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click',function(){
    if(!audioEl.src||audioEl.src===window.location.href){setStatus('LOAD A FILE FIRST');return;}
    if(!audioReady&&!buildAudioGraph()) return;
    resumeCtx();
    audioEl.play()
        .then(()=>setStatus(isProcessing?'PROCESSING':'BYPASSED'))
        .catch(err=>{console.error('play() rejected:',err);setStatus('PLAYBACK BLOCKED');});
});
document.getElementById('btn-stop').addEventListener('click',()=>{audioEl.pause();audioEl.currentTime=0;setStatus('STOPPED');});
document.getElementById('btn-rw').addEventListener('click',()=>{if(audioEl.readyState)audioEl.currentTime=Math.max(0,audioEl.currentTime-5);});
document.getElementById('btn-ff').addEventListener('click',()=>{if(audioEl.readyState)audioEl.currentTime=Math.min(audioEl.duration||0,audioEl.currentTime+5);});

// ── Seek ──────────────────────────────────────────────────────────────────────
let seeking=false;
seekBar.addEventListener('touchstart',()=>{seeking=true;},{passive:true});
seekBar.addEventListener('mousedown', ()=>{seeking=true;});
seekBar.addEventListener('input', ()=>{if(audioEl.duration)audioEl.currentTime=(seekBar.value/1000)*audioEl.duration;});
seekBar.addEventListener('change',()=>{seeking=false;});
audioEl.addEventListener('timeupdate',()=>{
    if(!seeking&&audioEl.duration){seekBar.value=(audioEl.currentTime/audioEl.duration)*1000;timeLbl.textContent=fmt(audioEl.currentTime);}
});
audioEl.addEventListener('ended',()=>{setStatus('FINISHED');seekBar.value=0;});
function fmt(s){return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

// ── Bypass ────────────────────────────────────────────────────────────────────
bypassBtn.addEventListener('click',()=>{
    isProcessing=!isProcessing;
    if(audioReady){
        loFilter.gain.value =isProcessing?(document.getElementById('contour').value/100)*25:0;
        hiFilter.gain.value =isProcessing?(document.getElementById('clarity').value/100)*25:0;
        if(!isProcessing) delayGain.gain.value=0;
    }
    bypassBtn.innerHTML=isProcessing?'PROCESS<br>ON':'PROCESS<br>OFF';
    bypassBtn.className=isProcessing?'active':'inactive';
    setStatus(isProcessing?'PROCESSING':'BYPASSED');
});

// ── Sliders ───────────────────────────────────────────────────────────────────
document.getElementById('clarity').addEventListener('input',function(){if(hiFilter&&isProcessing)hiFilter.gain.value=(this.value/100)*25;});
document.getElementById('depth').addEventListener('input',function(){if(delayGain&&isProcessing)delayGain.gain.value=(this.value/100)*0.8;});
document.getElementById('contour').addEventListener('input',function(){if(loFilter&&isProcessing)loFilter.gain.value=(this.value/100)*25;});

// ── MP3 Recording ─────────────────────────────────────────────────────────────
const recBtn=document.getElementById('btn-rec');
recBtn.addEventListener('click',function(){
    if(!audioReady){setStatus('PRESS PLAY FIRST');return;}
    if(!isRecording){
        if(typeof lamejs==='undefined'){setStatus('MP3 LIB LOADING…');return;}
        lameMp3Enc=new lamejs.Mp3Encoder(2,audioCtx.sampleRate,128);
        mp3Chunks=[];
        isRecording=true;
        this.textContent='■ STOP REC';
        this.classList.add('recording');
        setStatus('RECORDING MP3…');
    } else {
        isRecording=false;
        this.textContent='● REC MP3';
        this.classList.remove('recording');
        if(lameMp3Enc){const fl=lameMp3Enc.flush();if(fl.length>0)mp3Chunks.push(new Int8Array(fl));}
        saveMp3();
    }
});

function saveMp3(){
    if(!mp3Chunks.length){setStatus('NOTHING RECORDED');return;}
    const blob=new Blob(mp3Chunks,{type:'audio/mp3'});
    const url=URL.createObjectURL(blob);
    const a=Object.assign(document.createElement('a'),{href:url,download:'ImpactMix.mp3'});
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),8000);
    setStatus('MP3 SAVED ✓');
}

function setStatus(msg){statusEl.textContent=msg;}

// ── Draw loop ─────────────────────────────────────────────────────────────────
function draw(){
    requestAnimationFrame(draw);

    const bins=analyser?analyser.frequencyBinCount:64;
    const freq=new Uint8Array(bins);
    if(analyser) analyser.getByteFrequencyData(freq);

    const clarityVal = document.getElementById('clarity').value/100;
    const depthVal   = document.getElementById('depth').value/100;
    const contourVal = document.getElementById('contour').value/100;

    ctx.clearRect(0,0,SIZE,SIZE);

    // Sphere background
    const bg=ctx.createRadialGradient(CX,CY*0.85,0,CX,CY,R*1.05);
    bg.addColorStop(0,  'rgba(4,28,22,1)');
    bg.addColorStop(0.5,'rgba(2,14,12,1)');
    bg.addColorStop(1,  'rgba(0,4,8,1)');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.fillStyle=bg; ctx.fill();

    // Clip to sphere
    ctx.save();
    ctx.beginPath(); ctx.arc(CX,CY,R-0.5,0,Math.PI*2); ctx.clip();

    // ── Celestial stars — precessing Keplerian orbits with trails ──
    const t = Date.now() / 1000;
    STARS.forEach(s => {
        const rawFreq    = freq[Math.min(s.fi, bins-1)] / 255;
        const sliderBoost = s.band==='lo' ? contourVal*0.6
                          : s.band==='hi' ? clarityVal*0.6
                          :                 depthVal*0.4;
        const energy = Math.min(1, rawFreq + sliderBoost);

        // Band colors
        let cr,cg,cb;
        if      (s.hue==='lo')  { cr=0;   cg=210; cb=140; }
        else if (s.hue==='hi')  { cr=170; cg=235; cb=255; }
        else                    { cr=0;   cg=255; cb=215; }
        const bloom = energy * 0.68;
        const r = Math.round(cr+(255-cr)*bloom);
        const g = Math.round(cg+(255-cg)*bloom*0.45);
        const b = Math.round(cb+(255-cb)*bloom*0.25);

        // ── Trail: draw ghost positions behind the star ──
        for (let step = s.trailLen; step >= 1; step--) {
            const tOff  = step * s.trailDt;
            const ghost = getStarPos(s, t, tOff);
            if (ghost.depth < -0.05) continue;
            const ghostDepth = 0.28 + 0.72 * ((ghost.depth+1)/2);
            const fade  = (1 - step / (s.trailLen + 1));   // 0=oldest, 1=newest
            const tAlpha= fade * 0.18 * ghostDepth * (0.4 + energy*0.5);
            const tRad  = Math.max(0.1, s.size * 0.55 * fade * ghostDepth);
            ctx.beginPath(); ctx.arc(ghost.sx, ghost.sy, tRad, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${cr},${cg},${cb},${tAlpha})`;
            ctx.fill();
        }

        // ── Core star ──
        const pos        = getStarPos(s, t);
        if (pos.depth < -0.08) return;
        const depthAlpha = 0.28 + 0.72 * ((pos.depth+1)/2);
        const depthScale = 0.50 + 0.50 * ((pos.depth+1)/2);
        const twinkle    = 1 + (s.twinkleAmp + energy*0.22) * Math.sin(t*s.twinkleSpeed + s.twinklePhase);
        const alpha      = Math.min(1, (s.basOp + energy*0.45) * depthAlpha * twinkle);
        const radius     = (s.size + energy*1.1) * depthScale;

        // Glow halo
        const haloR = Math.max(radius*2.5, radius*2.5 + energy*4.5);
        if (alpha > 0.08) {
            const glow = ctx.createRadialGradient(pos.sx,pos.sy,0,pos.sx,pos.sy,haloR);
            glow.addColorStop(0,   `rgba(${r},${g},${b},${alpha*(0.28+energy*0.38)})`);
            glow.addColorStop(0.5, `rgba(${cr},${cg},${cb},${alpha*0.05})`);
            glow.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(pos.sx,pos.sy,haloR,0,Math.PI*2);
            ctx.fillStyle=glow; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(pos.sx,pos.sy,Math.max(0.18,radius),0,Math.PI*2);
        ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(1,alpha)})`;
        ctx.fill();
    });

    const rotY=(Date.now()/1000)*0.16;
    const P=NODES.map(n=>proj(n.lat,n.lon,rotY));

    // ── Edges — depth-sorted back→front, strict back-face culling ──
    // Pre-compute edge midpoint depth, sort so back edges draw first (painter's algo)
    const edgeSorted = EDGES.map(([a,b]) => {
        const pa=P[a],pb=P[b];
        return { a, b, pa, pb, midZ:(pa.z+pb.z)/2 };
    }).sort((x,y)=>x.midZ-y.midZ); // back first

    edgeSorted.forEach(({a,b,pa,pb,midZ})=>{
        // Cull any edge where BOTH endpoints are behind the hemisphere
        if(pa.z < 0.0 && pb.z < 0.0) return;
        // Smoothly fade edges near the limb (z≈0) — prevents harsh crossing lines
        const vis = Math.min(1, Math.max(0, midZ + 0.18) * 3.5);
        if(vis <= 0) return;
        const na=NODES[a],nb=NODES[b];
        const va=freq[Math.min(na.fi,bins-1)]/255;
        const vb=freq[Math.min(nb.fi,bins-1)]/255;
        const e=(va+vb)/2;
        const type=na.type;
        const [r,g,b2]= type==='lo'?[0,200,155]: type==='hi'?[160,245,255]:[0,255,215];
        const alpha=Math.min(0.55, (0.04+e*0.38)*vis);
        ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
        ctx.strokeStyle=`rgba(${r},${g},${b2},${alpha})`;
        ctx.lineWidth=0.4+e*0.85;
        ctx.stroke();
    });

    // ── Nodes ──
    NODES.forEach((n,i)=>{
        const p=P[i];
        if(p.z<-0.12) return;

        const rawV = freq[Math.min(n.fi,bins-1)]/255;
        // Slider boosts per zone — lo=contour, mid=depth, hi=clarity
        const boost = n.type==='lo' ? contourVal*0.55
                    : n.type==='hi' ? clarityVal*0.55
                    :                  depthVal*0.35;
        const energy=Math.min(1, rawV+boost);
        const vis=Math.max(0, p.z+0.18);
        const dotR=Math.max(0.3,(0.8+energy*3.8)*vis);

        // Zone colors
        // lo  = deep teal-green (bass warmth)
        // mid = pure neon cyan (spatial)
        // hi  = cold white-blue-cyan (air/treble)
        const [cr,cg,cb]= n.type==='lo'?[0,210,140]: n.type==='hi'?[170,240,255]:[0,255,210];

        // Glow halo
        if(energy>0.06){
            const glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,dotR*5);
            glow.addColorStop(0,  `rgba(${cr},${cg},${cb},${energy*0.55*vis})`);
            glow.addColorStop(0.4,`rgba(${cr},${cg},${cb},${energy*0.12*vis})`);
            glow.addColorStop(1,  'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(p.x,p.y,dotR*5,0,Math.PI*2);
            ctx.fillStyle=glow; ctx.fill();
        }

        // Core: blend to white at high energy
        const wm=energy*0.85;
        const rr=Math.round(cr+(255-cr)*wm);
        const gg=Math.round(cg+(255-cg)*wm*0.4);
        const bb=Math.round(cb+(255-cb)*wm*0.25);
        ctx.beginPath(); ctx.arc(p.x,p.y,dotR,0,Math.PI*2);
        ctx.fillStyle=`rgba(${rr},${gg},${bb},${Math.min(1,0.45+energy*0.75)*vis})`;
        ctx.fill();
    });

    ctx.restore(); // end sphere clip

    // Specular highlight (top-left, like reference image)
    const spec=ctx.createRadialGradient(CX-R*0.38,CY-R*0.38,0,CX,CY,R);
    spec.addColorStop(0,'rgba(0,255,200,0.08)');
    spec.addColorStop(0.55,'rgba(0,255,200,0.01)');
    spec.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.fillStyle=spec; ctx.fill();

    // Rim glow
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,255,204,0.32)';
    ctx.lineWidth=1.8;
    ctx.stroke();
}

draw();

// ── Anti-jog: prevent touchmove on the sphere from scrolling the page ─────────
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
// Also lock the whole app container so incidental swipes don't scroll
document.querySelector('.app-container').addEventListener('touchmove', function(e) {
    // Allow vertical scroll on sliders/buttons but block any rubber-band / page scroll
    e.stopPropagation();
}, { passive: true });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
</script>

</body>
</html>
